# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
#
# NOTE: Windows / MSVC (`cl`) and Clang are intentionally not part of the
# matrix because neither implements C++26 reflection, which Baldr relies on.
# Windows builds use the MinGW-w64 GCC 16 toolchain from niXman/mingw-builds-binaries.
name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        include:
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            cc: gcc
            cxx: g++
          - os: windows-latest
            c_compiler: 'C:/mingw64-gcc16/bin/gcc.exe'
            cpp_compiler: 'C:/mingw64-gcc16/bin/g++.exe'
            cc: 'C:/mingw64-gcc16/bin/gcc.exe'
            cxx: 'C:/mingw64-gcc16/bin/g++.exe'

    steps:
    - uses: actions/checkout@v4

    - name: switch to gcc-16 on linux
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        sudo apt-get install -y gcc-16 g++-16
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-16 100 --slave /usr/bin/g++ g++ /usr/bin/g++-16 --slave /usr/bin/gcov gcov /usr/bin/gcov-16
        sudo update-alternatives --set gcc /usr/bin/gcc-16

    - name: Install MinGW-w64 GCC 16 (niXman mingw-builds) on Windows
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $url = 'https://github.com/niXman/mingw-builds-binaries/releases/download/16.1.0-rt_v14-rev1/x86_64-16.1.0-release-posix-seh-ucrt-rt_v14-rev1.7z'
        $zip = "$env:TEMP\mingw64.7z"
        $toolchain = 'C:\mingw64-gcc16'
        Write-Host "Downloading $url"
        Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
        Write-Host "Extracting toolchain to $toolchain"
        if (Test-Path $toolchain) { Remove-Item -Recurse -Force $toolchain }
        & 7z.exe x $zip -oC:\ -y | Out-Null
        # The archive's top-level folder is the build name; rename it to a stable path.
        $extracted = Get-ChildItem -Path 'C:\' -Directory |
          Where-Object { $_.Name -like 'x86_64-16.1.0-*' } |
          Select-Object -First 1
        if (-not $extracted) { throw 'Could not locate extracted GCC 16 toolchain directory under C:\' }
        Rename-Item -Path $extracted.FullName -NewName 'mingw64-gcc16'
        $gcc = 'C:\mingw64-gcc16\bin\gcc.exe'
        & $gcc --version
        # Strip any preinstalled mingw64/msys64 entries from machine PATH so our
        # GCC 16 wins, and prepend our toolchain.
        $sysPath = [Environment]::GetEnvironmentVariable('Path', 'Machine')
        $newSysPath = ($sysPath -split ';' | Where-Object { $_ -and ($_ -notmatch 'mingw64') -and ($_ -notmatch 'msys64') }) -join ';'
        $newSysPath = "C:\mingw64-gcc16\bin;$newSysPath"
        [Environment]::SetEnvironmentVariable('Path', $newSysPath, 'Machine')
        $env:Path = $newSysPath
        & $gcc --version

    - name: Cache CMake build directory
      uses: actions/cache@v4
      with:
        path: build
        key: ${{ runner.os }}-${{ matrix.c_compiler }}-${{ matrix.build_type }}-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt', 'src/Baldr/**', 'test/**.cpp') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.c_compiler }}-${{ matrix.build_type }}-Ninja

    - name: Verify GCC version (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        export PATH="/c/mingw64-gcc16/bin:$PATH"
        which gcc && gcc --version
        which g++ && g++ --version

    - name: Configure CMake
      shell: bash
      run: >
        cmake -B "build"
        -G "Ninja"
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DBALDR_BUILD_TESTS=ON
        -S "${{ github.workspace }}"

    - name: Build
      shell: bash
      run: |
        export PATH="/c/mingw64-gcc16/bin:$PATH"
        cmake --build "build" --config ${{ matrix.build_type }}

    - name: Test
      shell: bash
      working-directory: build
      run: |
        export PATH="/c/mingw64-gcc16/bin:$PATH"
        ctest --test-dir ./test --build-config ${{ matrix.build_type }}
