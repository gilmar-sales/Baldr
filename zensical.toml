[project]
site_name = "Baldr"
site_description = "A C++ microframework for the web with native support for dependency injection and logging."
site_author = "gilmar-sales"
site_url = "https://gilmar-sales.github.io/Baldr/"
repo_url = "https://github.com/gilmar-sales/Baldr"
repo_name = "gilmar-sales/Baldr"
edit_uri = "edit/main/docs/"
copyright = "Copyright &copy; gilmar-sales"
docs_dir = "docs"
site_dir = "site"

[project.theme]
variant = "modern"
language = "en"
features = [
    "navigation.tabs",
    "navigation.sections",
    "navigation.top",
    "navigation.path",
    "toc.follow",
    "content.action.edit",
    "content.action.view",
    "content.code.copy"
]

[project.theme.icon]
repo = "fontawesome/brands/github"
edit = "material/pencil"
view = "material/eye"

[project.markdown_extensions]
attr_list = {}
admonition = {}
md_in_html = {}
footnotes = {}
tables = {}
toc = { permalink = true }
codehilite = { guess_lang = false }

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [] 

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "material.extensions.emoji.twemoji"
emoji_generator = "material.extensions.emoji.to_svg"

[[project.nav]]
Home = "index.md"

[[project.nav]]
"Get started" = "get-started.md"

[[project.nav]]
Tutorial = [
    "tutorial/01-hello-world.md",
    "tutorial/02-routing-and-results.md",
    "tutorial/03-dependency-injection.md",
    "tutorial/04-middleware.md",
    "tutorial/05-static-files.md",
    "tutorial/06-testing.md",
]

[[project.nav]]
Usage = [
    "usage/overview.md",
    "usage/routing.md",
    "usage/route-options.md",
    "usage/results.md",
    "usage/streaming-results.md",
    "usage/static-files.md",
    "usage/middleware.md",
    "usage/tracing.md",
    "usage/dependency-injection.md",
]

[[project.nav]]
Setup = [
    "setup/build.md",
    "setup/project-structure.md",
]

[[project.nav]]
Middleware = [
    "middleware/overview.md",
    "middleware/logging.md",
    "middleware/request-id.md",
    "middleware/exception-handler.md",
    "middleware/compression.md",
    "middleware/security-headers.md",
    "middleware/cors.md",
    "middleware/csrf.md",
    "middleware/rate-limit.md",
]

[[project.nav]]
Extensions = [
    "extensions/index.md",
    "extensions/openapi.md",
    "extensions/openapi-ui.md",
]

[[project.nav]]
Authoring = [
    "authoring/examples.md",
    "authoring/examples/hello-world.md",
    "authoring/examples/hello-service.md",
    "authoring/examples/devices.md",
    "authoring/examples/weather-forecast.md",
    "authoring/examples/static-files.md",
    "authoring/examples/file-stream.md",
    "authoring/examples/open-api.md",
    "authoring/examples/todo.md",
]

[[project.nav]]
Community = [
    "community/contributing.md",
    "community/license.md",
] 

[project.extra]
generator = true